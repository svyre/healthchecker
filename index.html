<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер Здоровья</title>

<style>
:root{
--primary:#3498db;
--danger:#e74c3c;
--bg:#f4f7f6;
}

body{
font-family:Segoe UI,Roboto,sans-serif;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
background:white;
width:90%;
max-width:500px;
padding:40px;
border-radius:24px;
box-shadow:0 15px 35px rgba(0,0,0,.1);
text-align:center;
}

.hidden{display:none;}

.btn{
background:var(--primary);
color:white;
border:none;
padding:15px;
border-radius:12px;
font-size:18px;
cursor:pointer;
width:100%;
}

.option-btn{
background:#fff;
border:2px solid #edf2f7;
padding:14px;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
width:100%;
text-align:left;
}

.progress-container{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
margin-bottom:20px;
display:none;
}

.progress-bar{
height:100%;
width:0%;
background:var(--primary);
border-radius:10px;
}

.heart-rate{
width:50px;
height:50px;
margin:0 auto 20px;
background:var(--danger);
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(.95);}
70%{transform:scale(1);}
100%{transform:scale(.95);}
}
</style>
</head>

<body>

<div class="card">


<div id="welcome-screen">
<h1>Добро пожаловать 👋</h1>
<p>Введите имя перед началом диагностики</p>

<input id="username" placeholder="Ваше имя"
style="width:100%;padding:12px;margin:15px 0;border-radius:10px;border:1px solid #ddd;font-size:16px;">

<button class="btn" onclick="goToStart()">Продолжить</button>
</div>


<div id="start-screen" class="hidden">
<div class="heart-rate"></div>
<h1>Диагностика Здоровья</h1>
<p>Экспресс-тест из 10 вопросов</p>
<button class="btn" onclick="startQuiz()">Начать диагностику</button>
</div>

<div id="p-container" class="progress-container">
<div id="p-bar" class="progress-bar"></div>
</div>


<div id="quiz-screen" class="hidden">
<div id="question" style="font-size:20px;font-weight:bold;margin-bottom:20px;"></div>
<div id="options"></div>
</div>


<div id="result-screen" class="hidden">
<h2 id="res-title"></h2>
<p id="res-desc"></p>
<button class="btn" onclick="location.reload()">На главную</button>
</div>

</div>

<script>


const SHEET_API_URL="https://script.google.com/macros/s/AKfycby-VDxJulVufldbUzaP7CBTOwbkMuhk2QReSzHOT-hIcCv81AupY4GHtNpCR4E-EJvO/exec";


let userName="";
let current=0;
let score=0;

const questions = [
        { q: "Как ты оцениваешь свое самочувствие к концу учебного дня?", a: [{t:"Остаются силы на хобби", s:0}, {t:"Чувствую усталость", s:1}, {t:"Полное истощение", s:2}] },
        { q: "Сколько часов ты спишь в будние дни?", a: [{t:"8-10 часов", s:0}, {t:"6-7 часов", s:1}, {t:"Менее 6 часов", s:2}] },
        { q: "За сколько минут до сна ты убираешь телефон?", a: [{t:"За час и более", s:0}, {t:"За 15-30 минут", s:1}, {t:"Засыпаю с телефоном", s:2}] },
        { q: "Завтракаешь ли ты перед школой горячей пищей?", a: [{t:"Да, всегда", s:0}, {t:"Иногда / пью только чай", s:1}, {t:"Никогда", s:2}] },
        { q: "Сколько времени в день ты проводишь в движении?", a: [{t:"Более 60 минут", s:0}, {t:"Около 30 минут", s:1}, {t:"Почти не двигаюсь", s:2}] },
        { q: "Делаешь ли ты перерывы при работе за компьютером/телефоном?", a: [{t:"Да, каждые 40-50 минут", s:0}, {t:"Редко", s:1}, {t:"Сижу без перерыва", s:2}] },
        { q: "Как часто у тебя болит голова или режет глаза?", a: [{t:"Редко/Никогда", s:0}, {t:"1-2 раза в неделю", s:1}, {t:"Почти каждый день", s:2}] },
        { q: "Ощущаешь ли ты дискомфорт в шее или спине?", a: [{t:"Нет", s:0}, {t:"Иногда после уроков", s:1}, {t:"Постоянные боли", s:2}] },
        { q: "Сколько чистой воды ты выпиваешь за день?", a: [{t:"Больше 1-1.5 литров", s:0}, {t:"Пару стаканов", s:1}, {t:"Только чай/газировки", s:2}] },
        { q: "Твой средний уровень эмоционального напряжения?", a: [{t:"Спокоен(на)", s:0}, {t:"Периодически нервничаю", s:1}, {t:"Постоянная тревога", s:2}] }
    ];;

function goToStart(){
userName=document.getElementById("username").value||"Аноним";
document.getElementById("welcome-screen").classList.add("hidden");
document.getElementById("start-screen").classList.remove("hidden");
}

function startQuiz(){
document.getElementById("start-screen").classList.add("hidden");
document.getElementById("quiz-screen").classList.remove("hidden");
document.getElementById("p-container").style.display="block";
showQuestion();
}

function showQuestion(){
const q=questions[current];
document.getElementById("question").innerText=q.q;

const opt=document.getElementById("options");
opt.innerHTML="";

q.a.forEach(ans=>{
const b=document.createElement("button");
b.className="option-btn";
b.innerText=ans.t;

b.onclick=()=>{
    score+=ans.s;
current++;
updateProgress();
current<questions.length?showQuestion():showResult();
};

opt.appendChild(b);
});
}

function updateProgress(){
document.getElementById("p-bar").style.width=
(current/questions.length*100)+"%";
}

function sendResultToSheets(resultText){
fetch(SHEET_API_URL,{
method:"POST",
body:JSON.stringify({
name:userName,
score:score,
result:resultText
})
});
}

function showResult(){

document.getElementById("quiz-screen").classList.add("hidden");
document.getElementById("p-container").classList.add("hidden");
document.getElementById("result-screen").classList.remove("hidden");

const title=document.getElementById("res-title");
const desc=document.getElementById("res-desc");

let resultText="";

if(score <= 6) { 
            zone = "Низкий риск"; color = "#2e7d32"; 
            document.getElementById('res-title').innerText = "Зеленая зона: Норма 🟢";
            document.getElementById('res-desc').innerHTML = "<b>Твои показатели в норме!</b> Организм отлично справляется с нагрузками.<br><br><b>Рекомендация:</b> Продолжай спать 8-9 часов и не забывай про активность. Чтобы глаза не уставали от учебы, старайся делать зрительные перерывы каждые 45 минут.";
            document.getElementById('res-desc').style.textAlign = "left";
        }
        else if(score <= 13) { 
            zone = "Средний риск"; color = "#f57f17"; 
            document.getElementById('res-title').innerText = "Желтая зона: Внимание 🟡";
            document.getElementById('res-desc').innerHTML = "<b>Выявлены признаки утомления. Пора скорректировать режим!</b><br><br><b>Рекомендация:</b> Постарайся ложиться спать на 30-40 минут раньше и убирать телефон за час до сна (свет экрана мешает мозгу отдыхать). Не пропускай утренний завтрак — это твоя энергия на первые уроки.";
            document.getElementById('res-desc').style.textAlign = "left";
        }
        else { 
            zone = "Высокий риск"; color = "#c62828"; 
            document.getElementById('res-title').innerText = "Красная зона: Риск 🔴";
            document.getElementById('res-desc').innerHTML = "<b>Внимание! Высокий уровень переутомления.</b><br><br><b>Рекомендация:</b> Твоя нервная система истощена нагрузками. Начни жестко контролировать отбой (сон не менее 7-8 часов) и резко сократи время в гаджетах. Рекомендуем пересмотреть свое расписание и обсудить нагрузку с родителями.";
            document.getElementById('res-desc').style.textAlign = "left";
        }

sendResultToSheets(resultText);
}

</script>
</body>
</html>
